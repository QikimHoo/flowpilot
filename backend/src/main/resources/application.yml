spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:progress_tool}
    username: ${DB_USER:progress}
    password: ${DB_PASSWORD:progress}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
    open-in-view: false
  flyway:
    enabled: true

server:
  port: 8080

app:
  leader-users:
    - u_leader
  notification:
    enabled: false
    webhook-url: ""
